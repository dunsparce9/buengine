<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>büegame editor</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
  <link rel="stylesheet" href="css/editor.css">
</head>
<body>

  <!-- ── Top menu bar ──────────────────────────── -->
  <div id="menu-bar">
    <div class="menu-item" data-menu="file">
      File
      <div class="menu-dropdown" id="menu-file">
        <button class="menu-action" data-action="open-folder"><span class="material-symbols-outlined">folder_open</span>Open Folder&hellip;<span class="menu-shortcut">Ctrl+O</span></button>
        <div class="menu-sep"></div>
        <button class="menu-action" data-action="save"><span class="material-symbols-outlined">save</span>Save<span class="menu-shortcut">Ctrl+S</span></button>
        <button class="menu-action" data-action="save-all"><span class="material-symbols-outlined">save_as</span>Save All<span class="menu-shortcut">Ctrl+Shift+S</span></button>
        <div class="menu-sep"></div>
        <button class="menu-action" data-action="import-zip"><span class="material-symbols-outlined">upload_file</span>Import ZIP&hellip;</button>
        <button class="menu-action" data-action="export-zip"><span class="material-symbols-outlined">archive</span>Export as ZIP</button>
        <div class="menu-sep"></div>
        <button class="menu-action" data-action="export-json"><span class="material-symbols-outlined">file_download</span>Export current JSON</button>
        <div class="menu-sep"></div>
        <button class="menu-action" data-action="exit"><span class="material-symbols-outlined">exit_to_app</span>Exit</button>
      </div>
    </div>
    <div class="menu-item" data-menu="run">
      Run
      <div class="menu-dropdown" id="menu-run">
        <button class="menu-action" data-action="run-in-tab"><span class="material-symbols-outlined">open_in_new</span>Run in new tab</button>
      </div>
    </div>
    <div class="menu-item" data-menu="help">
      Help
      <div class="menu-dropdown" id="menu-help">
        <button class="menu-action" data-action="about"><span class="material-symbols-outlined">info</span>About</button>
      </div>
    </div>
    <div class="menu-spacer"></div>
    <button class="menu-run-btn" id="run-btn" title="Run in new tab"><span class="material-symbols-outlined">play_arrow</span>Run</button>
  </div>

  <!-- ── Main layout ──────────────────────────── -->
  <div id="editor-layout">

    <!-- Left panel: file tree -->
    <div id="file-panel">
      <div class="panel-header">Files</div>
      <ul id="file-list"></ul>
    </div>

    <div class="resize-handle" id="resize-left"></div>

    <!-- Center: viewport -->
    <div id="viewport">
      <div id="viewport-scene">
        <div id="viewport-empty">Select a scene to preview</div>
      </div>
    </div>

    <div class="resize-handle" id="resize-right"></div>

    <!-- Right panel: property inspector -->
    <div id="props-panel">
      <div class="panel-header">Properties</div>
      <div id="props-content">
        <div class="props-empty">Nothing selected</div>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container"></div>

  <!-- Floating windows are created dynamically by JS -->

  <script type="module" src="js/editor.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>büegame editor</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
  <link rel="stylesheet" href="css/editor.css">
</head>
<body>

  <!-- ── Top menu bar ──────────────────────────── -->
  <div id="menu-bar">
    <div class="menu-item" data-menu="file">
      File
      <div class="menu-dropdown" id="menu-file">
        <button class="menu-action" data-action="export">Export JSON</button>
        <button class="menu-action" data-action="exit">Exit</button>
      </div>
    </div>
    <div class="menu-item" data-menu="run">
      Run
      <div class="menu-dropdown" id="menu-run">
        <button class="menu-action" data-action="run-in-tab">Run in new tab</button>
      </div>
    </div>
    <div class="menu-item" data-menu="help">
      Help
      <div class="menu-dropdown" id="menu-help">
        <button class="menu-action" data-action="about">About</button>
      </div>
    </div>
    <div class="menu-spacer"></div>
    <button class="menu-run-btn" id="run-btn" title="Run in new tab">▶ Run</button>
  </div>

  <!-- ── Main layout ──────────────────────────── -->
  <div id="editor-layout">

    <!-- Left panel: file list -->
    <div id="file-panel">
      <div class="panel-header">Scripts</div>
      <ul id="file-list"></ul>
    </div>

    <div class="resize-handle" id="resize-left"></div>

    <!-- Center: viewport -->
    <div id="viewport">
      <div id="viewport-scene">
        <div id="viewport-empty">Select a scene to preview</div>
      </div>
    </div>

    <div class="resize-handle" id="resize-right"></div>

    <!-- Right panel: property inspector -->
    <div id="props-panel">
      <div class="panel-header">Properties</div>
      <div id="props-content">
        <div class="props-empty">Nothing selected</div>
      </div>
    </div>
  </div>

  <!-- Floating windows are created dynamically by JS -->

  <script type="module" src="js/editor.js"></script>
</body>
</html>
